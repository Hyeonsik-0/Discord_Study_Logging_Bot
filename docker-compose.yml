services:
  mysql:
    image: mysql:8.0
    container_name: studybot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: studybot
      MYSQL_USER: studybot
      MYSQL_PASSWORD: studybot
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
